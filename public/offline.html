<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — SIK MI Miftahul Ulum 01</title>
    <meta name="theme-color" content="#0d9488" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
        color: #064e3b;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .container {
        max-width: 28rem;
        text-align: center;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(16px);
        border-radius: 1.5rem;
        padding: 2.5rem 2rem;
        box-shadow: 0 20px 50px -12px rgba(13, 148, 136, 0.15);
        border: 1px solid rgba(13, 148, 136, 0.1);
      }
      .icon-wrap {
        width: 5rem;
        height: 5rem;
        margin: 0 auto 1.5rem;
        background: linear-gradient(135deg, #10b981 0%, #0d9488 100%);
        border-radius: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 25px -5px rgba(13, 148, 136, 0.3);
      }
      .icon-wrap svg {
        width: 2.5rem;
        height: 2.5rem;
        color: white;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #064e3b;
      }
      p {
        font-size: 0.95rem;
        color: #047857;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, #10b981 0%, #0d9488 100%);
        color: white;
        border: none;
        padding: 0.875rem 1.75rem;
        border-radius: 0.875rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        box-shadow: 0 4px 12px -2px rgba(13, 148, 136, 0.4);
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px -2px rgba(13, 148, 136, 0.5);
      }
      .btn:active {
        transform: translateY(0);
      }
      .hint {
        margin-top: 1.5rem;
        font-size: 0.8rem;
        color: #6b7280;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(135deg, #022c22 0%, #064e3b 100%);
          color: #d1fae5;
        }
        .container {
          background: rgba(6, 78, 59, 0.6);
          border-color: rgba(16, 185, 129, 0.2);
        }
        h1 {
          color: #ecfdf5;
        }
        p {
          color: #a7f3d0;
        }
        .hint {
          color: #6ee7b7;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon-wrap">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 18.894c3.807-3.808 9.98-3.808 13.788 0M1.924 19.771c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z"
          />
        </svg>
      </div>
      <h1>Anda Sedang Offline</h1>
      <p>
        Tidak ada koneksi internet. Beberapa data mungkin tidak tersedia.
        Silakan periksa koneksi Anda lalu coba lagi.
      </p>
      <button class="btn" onclick="window.location.reload()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          style="width: 1.1rem; height: 1.1rem"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"
          />
        </svg>
        Coba Lagi
      </button>
      <p class="hint">
        Aplikasi tetap bisa dibuka dari layar utama HP Anda setelah dipasang.
      </p>
    </div>
  </body>
</html>
